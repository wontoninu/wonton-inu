
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wonton Inu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  text-align: center;
}
 button {
  padding: 12px 22px;
  font-size: 18px;
  margin-top: 20px;
  margin-bottom: 10px;
  background: #229ED9; /* Telegram blue */
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
}
#fortune-container {
  margin-top: 30px;
}

#cookie {
  width: 180px;
  cursor: pointer;
  transition: transform 0.3s ease;
}

#cookie.cracked {
  transform: rotate(-8deg) scale(1.05);
}

#fortune-text {
  margin-top: 15px;
  font-size: 18px;
  min-height: 40px;
}
button:hover {
  background: #1b8cc8;
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(34, 158, 217, 0.4);
}
canvas {
  background: #111;
  display: block;
  margin: 20px auto;
}
</style>
</head>
<body>
<img src="banner.png" alt="Wonton Inu Banner" style="width:100%; max-height:200px; object-fit:cover;">

<img src="logo.png" alt="Wonton Inu Logo" style="width:200px; margin-top:20px; margin-bottom:10px;">
  <a href="https://t.me/wontoninu" target="_blank">
  <button>Join Telegram 🚀</button>
</a> 
  <br><br>


<a href="https://basescan.org/token/0x985805bEC842adAB8bb65dc42867e2cdd86546D2" target="_blank">
  <button>BaseScan 🔍</button>
</a>
  <div id="fortune-container">
  <h2>🥠 Wonton Fortune Cookie</h2>
  <p>Tap the cookie to crack it open and reveal your fortune.</p>

  <img
    id="cookie"
    src="cookie-closed.png"
    alt="Fortune Cookie"
    onclick="crackCookie()"
  />

  <p id="fortune-text"></p>

  <div id="fortune-actions" style="display:none;">
    <button onclick="shareFortune()">📣 Share</button>
    <button onclick="copyFortune()">📤 Send to Friend</button>
  </div>
</div>

  <p><strong>Token Address (Base)</strong></p>

<button onclick="navigator.clipboard.writeText('0x985805bEC842adAB8bb65dc42867e2cdd86546D2')">
Copy Token Address 📋
</button>

<p style="font-size:14px; opacity:0.8; word-break: break-all;">
0x985805bEC842adAB8bb65dc42867e2cdd86546D2
</p>
<h1>Wonton Inu 🥟🐶</h1>
<p>Welcome to the official Wonton Inu site</p>

<button onclick="startGame()">Start Wonton Catcher</button>
  <img id="cookieImage" src="images/cookie.png">
<canvas id="game" width="320" height="480"></canvas>
<script>
  console.log("Game loaded");

function openCookie() {
    document.getElementById("cookieImage").src = "images/cookie-open.png";

    const fortunes = [
      "Wonton Inu to the moon 🚀",
      "Diamond paws win 💎🐾",
      "Big pump energy coming",
      "Patience pays off 🥟",
      "Fortune favors the hodler"
    ];

    const random = Math.floor(Math.random() * fortunes.length);
    document.getElementById("fortune").innerText = fortunes[random];
  }
  const normalFortunes = [
  "Big gains come to patient holders.",
  "Community will take you further than hype.",
  "Your diamond hands will be rewarded.",
  "Something fun is about to surprise you.",
  "Trust the journey, not just the chart.",
  "A meme today becomes history tomorrow."
];

const rareFortunes = [
  "✨ RARE ✨ Massive opportunity reveals itself soon.",
  "✨ RARE ✨ You will be early when others are late.",
  "✨ RARE ✨ Fortune favors you today — don’t ignore signs."
];

let currentFortune = "";
let crackedToday = false;

function crackCookie() {
  if (crackedToday) return;

  document.getElementById("crack-sound").play();
  crackedToday = true;

  const cookie = document.getElementById("cookie");
  const sound = document.getElementById("crack-sound");

  cookie.classList.add("cracked");
  cookie.src = "cookie-open.png";
  sound.play();

  const isRare = isRareFortune();
  const fortune = isRare
    ? randomFrom(rareFortunes)
    : randomFrom(normalFortunes);

  currentFortune = fortune;

  document.getElementById("fortune-text").innerText =
    (isRare ? "🥠 RARE FORTUNE: " : "🥠 Your Fortune: ") + fortune;

  document.getElementById("fortune-actions").style.display = "block";
}

function isRareFortune() {
  const today = new Date().toDateString();
  const stored = localStorage.getItem("wonton_fortune_day");

  if (stored === today) return false;

  localStorage.setItem("wonton_fortune_day", today);
  return Math.random() < 0.15; // 15% chance daily rare
}

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function copyFortune() {
  navigator.clipboard.writeText(currentFortune);
  alert("Fortune copied! Send it 🍪");
}

function shareFortune() {
  const text = "🥠 My Wonton Fortune: " + currentFortune;
  const url = window.location.href;

  if (navigator.share) {
    navigator.share({
      title: "Wonton Fortune", MMO
      text,
      url
    });
  } else {
    navigator.clipboard.writeText(text + " " + url);
    alert("Fortune copied for sharing!");
  }
}
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let x = 140;

function startGame() {
  ctx.clearRect(0,0,320,480);
  ctx.fillText("Game Started!", 100, 200);
}

document.addEventListener("touchmove", e => {
  x = e.touches[0].clientX - canvas.offsetLeft;
  draw();
});

function draw() {
  ctx.clearRect(0,0,320,480);
  ctx.fillRect(x, 430, 40, 20);
}
</script>
</body>
</html>
