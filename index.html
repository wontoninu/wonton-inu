<h1>Wonton Inu 🥟🐶</h1>
<p>Welcome to the official Wonton Inu site</p>

<img id="cookieImage" src="images/cookie.png">

<button onclick="startGame()">Start Wonton Catcher</button>

<canvas
  id="game"
  width="320"
  height="480"
  style="display:none; margin: 20px auto; background:#111; border-radius:12px;"
></canvas>

  <script>
  console.log("Game loaded");

  const normalFortunes = [
  "Big gains come to patient holders.",
  "Community will take you further than hype.",
  "Your diamond hands will be rewarded.",
  "Something fun is about to surprise you.",
  "Trust the journey, not just the chart.",
  "A meme today becomes history tomorrow."
];

const rareFortunes = [
  "✨ RARE ✨ Massive opportunity reveals itself soon.",
  "✨ RARE ✨ You will be early when others are late.",
  "✨ RARE ✨ Fortune favors you today — don’t ignore signs."
];

/* ===== WONTON CATCHER GAME ===== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let playerX = 140;
let wontonY = 0;
let wontonX = Math.random() * 280;
let score = 0;
let gameRunning = false;

// Player movement
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  playerX =
    e.touches[0].clientX -
    canvas.getBoundingClientRect().left -
    20;
});

canvas.addEventListener("mousemove", e => {
  playerX = e.offsetX - 20;
});

function startGame() {
  canvas.style.display = "block";
  score = 0;
  wontonY = 0;
  wontonX = Math.random() * 280;
  gameRunning = true;
  requestAnimationFrame(gameLoop);
}

function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, 320, 480);

  // Player
  ctx.fillStyle = "#00aaff";
  ctx.fillRect(playerX, 440, 40, 20);

  // Wonton
  ctx.fillStyle = "#f5d6a1";
  ctx.beginPath();
  ctx.arc(wontonX, wontonY, 10, 0, Math.PI * 2);
  ctx.fill();

  wontonY += 3;

  // Catch
  if (
    wontonY > 430 &&
    wontonX > playerX &&
    wontonX < playerX + 40
  ) {
    score++;
    wontonY = 0;
    wontonX = Math.random() * 280;
  }

  // Miss
  if (wontonY > 480) {
    gameRunning = false;
    ctx.fillStyle = "#fff";
    ctx.font = "20px Arial";
    ctx.fillText("Game Over", 95, 200);
    ctx.fillText("Score: " + score, 105, 240);
    return;
  }

  // Score
  ctx.fillStyle = "#fff";
  ctx.font = "16px Arial";
  ctx.fillText("Score: " + score, 10, 20);

  requestAnimationFrame(gameLoop);
}
</script>
